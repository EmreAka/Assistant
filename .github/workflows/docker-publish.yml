name: Build and Push Docker Image

on:
  push:
    branches:
      - no-need-rag
  workflow_dispatch:

env:
  REGISTRY: registry.emreaka.net
  IMAGE_NAME: assistant
  COMPOSE_SERVICE: assistant

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Assistant.Api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.2.5
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          COMPOSE_SERVICE: ${{ env.COMPOSE_SERVICE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY,REGISTRY_USER,REGISTRY_PASSWORD,COMPOSE_SERVICE
          script: |
            set -e
            cd /home/ubuntu/projects/Server
            echo "$REGISTRY_PASSWORD" | sudo docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
            sudo docker compose pull "$COMPOSE_SERVICE"
            sudo docker compose up -d "$COMPOSE_SERVICE"
            sudo docker image prune -f
